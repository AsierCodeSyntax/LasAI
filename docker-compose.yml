services:
  # ==========================================
  # INFRAESTRUCTURA COMPARTIDA
  # ==========================================
  postgres:
    image: postgres:16
    container_name: lasai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lasai_core 
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lasai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334" 
    volumes:
      - qdrant_data:/qdrant/storage

  adminer:
    image: adminer:latest
    container_name: lasai_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ==========================================
  # MÓDULO 1: ZAINTZA TEKNOLOGIKOA
  # ==========================================
  api_module_1:
    build: ./backend/module_1_techwatch
    container_name: lasai_mod1_api
    restart: unless-stopped
    depends_on:
      - postgres
      - qdrant
    ports:
      - "8001:8000" 
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/techwatch_db"
      QDRANT_URL: "http://qdrant:6333"
      SOURCES_YAML: "/workspace/sources.yaml"
    volumes:
      - ./backend/module_1_techwatch:/workspace
    working_dir: /workspace
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker_module_1:
    build: ./backend/module_1_techwatch
    container_name: lasai_mod1_worker
    restart: "no"
    depends_on:
      - postgres
      - qdrant
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/techwatch_db"
      QDRANT_URL: "http://qdrant:6333"
      SOURCES_YAML: "/workspace/sources.yaml"
    volumes:
      - ./backend/module_1_techwatch:/workspace
    working_dir: /workspace
    command: ["echo", "Worker del Modulo 1 preparado. Usa 'docker compose run worker_module_1 bash'"]

  # ==========================================
  # FRONTEND
  # ==========================================
  frontend:
    image: node:20-alpine
    container_name: lasai_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pg_data:
  qdrant_data: